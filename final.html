<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Question 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold-light: #ffe787;
      --card-bg: rgba(5, 15, 40, 0.88);
      --text-secondary: #a8d4f0;
    }

    html, body { width:100%; height:100%; overflow:hidden; background:#020918; font-family:'Quicksand',sans-serif; }

    .bg {
      position:fixed; inset:0;
      background: url('Background.png') center center/cover no-repeat;
      animation: slowPan 30s ease-in-out infinite alternate;
    }
    @keyframes slowPan { from{transform:scale(1.05) translate(0,0)} to{transform:scale(1.05) translate(-2%,-1%)} }

    .stars-overlay { position:fixed; inset:0; pointer-events:none; z-index:1; }
    .star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation:twinkle var(--dur,3s) ease-in-out infinite; animation-delay:var(--delay,0s); }
    @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }

    .scene { position:fixed; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 28px;
      padding: 44px 44px 44px;
      max-width: 460px; width: 90%;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 80px rgba(245,200,66,.12),
        0 0 160px rgba(245,200,66,.06),
        inset 0 1px 0 rgba(255,255,255,.07);
      animation: floatCard 6s ease-in-out infinite, cardEnter 0.6s cubic-bezier(.4,0,.2,1);
    }
    @keyframes floatCard { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes cardEnter { from{opacity:0;transform:scale(.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

    .heart-wrap {
      margin-bottom: 20px;
    }
    .heart-img {
      width: 160px; height: 160px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(245,200,66,.6)) drop-shadow(0 0 40px rgba(245,200,66,.3));
      animation: heartPulse 2.5s ease-in-out infinite;
    }
    @keyframes heartPulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(245,200,66,.6)) drop-shadow(0 0 40px rgba(245,200,66,.3)); }
      50%      { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(245,200,66,.9)) drop-shadow(0 0 60px rgba(245,200,66,.5)); }
    }

    .question {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: var(--gold-light);
      line-height: 1.3;
      text-shadow: 0 0 20px rgba(245,200,66,.5), 0 0 40px rgba(245,200,66,.25);
      margin-bottom: 36px;
    }

    .btn-group { display:flex; gap:18px; justify-content:center; }

    .btn {
      padding: 14px 48px;
      border-radius: 50px; border:none; cursor:pointer;
      font-family:'Quicksand',sans-serif; font-size:1.15rem; font-weight:700;
      letter-spacing:.04em; transition:all .25s ease;
      position:relative; overflow:hidden;
    }
    .btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.15); opacity:0; transition:opacity .2s; }
    .btn:hover::after { opacity:1; }

    .btn-yes {
      background: linear-gradient(135deg,#f472b6,#ec4899);
      color:#fff;
      box-shadow: 0 4px 24px rgba(236,72,153,.55), 0 0 40px rgba(236,72,153,.2);
    }
    .btn-yes:hover { transform:scale(1.07); box-shadow:0 6px 32px rgba(236,72,153,.75),0 0 60px rgba(236,72,153,.3); }

    .btn-no {
      background: rgba(255,255,255,.08);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,.15);
      position:fixed; z-index:99;
    }

    .toast {
      position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
      background: rgba(5,15,40,.95);
      border: 1px solid rgba(245,200,66,.3);
      color: var(--gold-light);
      font-family:'Dancing Script',cursive; font-size:1.2rem;
      padding:16px 28px; border-radius:16px; max-width:380px;
      text-align:center; box-shadow:0 0 30px rgba(245,200,66,.2);
      z-index:200; opacity:0; transition:opacity .5s; pointer-events:none;
    }
    .toast.show { opacity:1; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="stars-overlay" id="starsOverlay"></div>

<div class="scene">
  <div class="card">
    <div class="heart-wrap">
      <img src="Heart.png" class="heart-img" alt="Constellation Heart"/>
    </div>
    <div class="question">Querida Susan, ¿juegas conmigo en la misma alianza?</div>
    <div class="btn-group">
      <button class="btn btn-yes" onclick="sayYes()">Yes 🥰</button>
    </div>
  </div>
</div>

<button class="btn btn-no" id="noBtn" onclick="noClick()">No</button>
<div class="toast" id="toast"></div>

<script>
  const overlay = document.getElementById('starsOverlay');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;
    overlay.appendChild(s);
  }

  const noBtn = document.getElementById('noBtn');
  let noAttempts = 0;
  let toastShown = false;

  window.addEventListener('load', () => {
    noBtn.style.left = (window.innerWidth/2 + 70)+'px';
    noBtn.style.top  = (window.innerHeight/2 + 70)+'px';
  });

  function placeNoRandom() {
    const margin = 60;
    const bw = noBtn.offsetWidth || 100;
    const bh = noBtn.offsetHeight || 44;
    let x, y, tries = 0;
    do {
      x = margin + Math.random()*(window.innerWidth  - bw - margin*2);
      y = margin + Math.random()*(window.innerHeight - bh - margin*2);
      tries++;
    } while(tries < 20 && Math.abs(x - window.innerWidth/2) < 130 && Math.abs(y - window.innerHeight/2) < 130);
    noBtn.style.transition = 'none';
    noBtn.style.left = x+'px';
    noBtn.style.top  = y+'px';
  }

  // Desktop: flee on hover
  noBtn.addEventListener('mouseover', ()=>{ if(!toastShown) placeNoRandom(); });

  // Mobile: flee before finger lands
  document.addEventListener('touchmove', (e) => {
    if(toastShown) return;
    const touch = e.touches[0];
    const rect  = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    if(Math.hypot(touch.clientX - cx, touch.clientY - cy) < 90) placeNoRandom();
  }, { passive: true });

  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(toastShown) return;
    noAttempts++;
    placeNoRandom();
    checkNoToast();
  });

  noBtn.addEventListener('click', () => {
    if(toastShown) return;
    noAttempts++;
    placeNoRandom();
    checkNoToast();
  });

  function checkNoToast() {
    if(noAttempts >= 3) {
      toastShown = true;
      noBtn.style.display = 'none';
      const toast = document.getElementById('toast');
      toast.innerHTML = `No doesn't want to be clicked 😔<br>Sad for you, you have no option left 😁🤪😝`;
      toast.classList.add('show');
    }
  }

  function sayYes() {
    document.body.style.transition = 'opacity 0.6s';
    document.body.style.opacity = '0';
    setTimeout(()=>{ window.location.href='tree.html'; }, 600);
  }
</script>
</body>
</html>
