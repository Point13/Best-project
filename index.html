<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spiel anheben 💫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f5c842;
      --gold-light: #ffe787;
      --blue-glow: #4fc3f7;
      --deep-space: #020918;
      --card-bg: rgba(5, 15, 40, 0.82);
      --text-primary: #e8f4fd;
      --text-secondary: #a8d4f0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep-space);
      font-family: 'Quicksand', sans-serif;
    }

    .bg {
      position: fixed; inset: 0;
      background: url('Background.png') center center / cover no-repeat;
      animation: slowPan 30s ease-in-out infinite alternate;
    }
    @keyframes slowPan {
      from { transform: scale(1.05) translate(0,0); }
      to   { transform: scale(1.05) translate(-2%, -1%); }
    }

    /* Twinkling stars overlay */
    .stars-overlay {
      position: fixed; inset: 0;
      background: transparent;
      pointer-events: none;
      z-index: 1;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.5); }
    }

    .scene {
      position: fixed; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(79, 195, 247, 0.25);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 480px; width: 90%;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 60px rgba(79, 195, 247, 0.12),
        0 0 120px rgba(79, 195, 247, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.07);
      animation: floatCard 6s ease-in-out infinite;
    }
    @keyframes floatCard {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-10px); }
    }

    .card-sparkle {
      font-size: 2rem;
      margin-bottom: 12px;
      animation: sparkleRotate 4s linear infinite;
    }
    @keyframes sparkleRotate {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .card h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 5vw, 2.8rem);
      color: var(--gold-light);
      line-height: 1.3;
      text-shadow: 0 0 20px rgba(245, 200, 66, 0.5), 0 0 40px rgba(245, 200, 66, 0.2);
      margin-bottom: 36px;
    }

    .btn-group {
      display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;
    }

    .btn {
      padding: 14px 44px;
      border-radius: 50px;
      border: none; cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.04em;
      transition: all 0.25s ease;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 1; }

    .btn-yes {
      background: linear-gradient(135deg, #f472b6, #ec4899);
      color: #fff;
      box-shadow: 0 4px 24px rgba(236,72,153,0.5), 0 0 40px rgba(236,72,153,0.2);
    }
    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 32px rgba(236,72,153,0.7), 0 0 60px rgba(236,72,153,0.3);
    }

    .btn-no {
      background: rgba(255,255,255,0.08);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      position: fixed; /* will be repositioned by JS */
      z-index: 99;
    }

    .toast {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(5, 15, 40, 0.95);
      border: 1px solid rgba(245, 200, 66, 0.3);
      color: var(--gold-light);
      font-family: 'Dancing Script', cursive;
      font-size: 1.2rem;
      padding: 16px 28px;
      border-radius: 16px;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 0 30px rgba(245,200,66,0.2);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="stars-overlay" id="starsOverlay"></div>

<div class="scene">
  <div class="card">
    <div class="card-sparkle">✨</div>
    <h1>Willst du spielen?<br>Quiz mit mir</h1>
    <div class="btn-group">
      <button class="btn btn-yes" onclick="goYes()">Yes</button>
    </div>
  </div>
</div>

<!-- Floating No button -->
<button class="btn btn-no" id="noBtn" onclick="noClick()">No</button>

<div class="toast" id="toast">
  maybe "no" doesn't want to be clicked 😔<br>Sad for you, you have no option left but to play my game 😏
</div>

<script>
  // Stars
  const overlay = document.getElementById('starsOverlay');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;
    overlay.appendChild(s);
  }

  // No button
  const noBtn = document.getElementById('noBtn');
  let noAttempts = 0;
  let toastShown = false;

  function placeNoBtn() {
    const margin = 60;
    const bw = noBtn.offsetWidth || 100;
    const bh = noBtn.offsetHeight || 44;
    // Pick a spot far from center to avoid overlap with Yes button
    let x, y, tries = 0;
    do {
      x = margin + Math.random() * (window.innerWidth  - bw - margin * 2);
      y = margin + Math.random() * (window.innerHeight - bh - margin * 2);
      tries++;
    } while (tries < 20 && Math.abs(x - window.innerWidth/2) < 120 && Math.abs(y - window.innerHeight/2) < 120);
    noBtn.style.transition = 'none';
    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';
  }

  // Initial position — bottom-right of card area
  window.addEventListener('load', () => {
    noBtn.style.left = (window.innerWidth/2 + 70) + 'px';
    noBtn.style.top  = (window.innerHeight/2 + 50) + 'px';
  });

  // Desktop: flee on hover
  noBtn.addEventListener('mouseover', () => { if(!toastShown) placeNoBtn(); });

  // Mobile: track finger and flee before touch lands
  document.addEventListener('touchmove', (e) => {
    if(toastShown) return;
    const touch = e.touches[0];
    const rect  = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const dist = Math.hypot(touch.clientX - cx, touch.clientY - cy);
    if(dist < 90) placeNoBtn();
  }, { passive: true });

  // touchstart as a fallback count trigger (finger landed = attempt)
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(toastShown) return;
    noAttempts++;
    placeNoBtn();
    checkToast();
  });

  // click fallback for desktop
  noBtn.addEventListener('click', (e) => {
    if(toastShown) return;
    noAttempts++;
    placeNoBtn();
    checkToast();
  });

  function checkToast() {
    if(noAttempts >= 3) {
      toastShown = true;
      noBtn.style.display = 'none';
      const toast = document.getElementById('toast');
      toast.classList.add('show');
    }
  }

  function goYes() {
    document.body.style.transition = 'opacity 0.6s';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = 'questions.html'; }, 600);
  }
</script>
</body>
</html>
